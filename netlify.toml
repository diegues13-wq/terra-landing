# ============================================================
#  Terra Latitude — Netlify Deployment Configuration
#  Domain: www.terralatitude.com
# ============================================================

[build]
  # Root del proyecto dentro del monorepo
  base    = "terra-landing"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA Routing ──────────────────────────────────────────────
# React Router / Snap-scroll SPA: todas las rutas → index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── HTTP Security & Cache Headers ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    # Assets tienen hash en el nombre → cache inmutable 1 año
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
