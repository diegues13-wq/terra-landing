server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        font/woff2
        image/svg+xml;

    # ── SPA Routing (React) ───────────────────────────────────
    # Cada ruta desconocida se sirve desde index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Assets con hash de contenido → cache 1 año ────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Archivos de root (logo, imágenes bg) → cache 1 semana ─
    location ~* \.(png|jpg|jpeg|webp|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Locales i18n → corta caché (pueden cambiar) ───────────
    location /locales/ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Ocultar versión de nginx ───────────────────────────────
    server_tokens off;
}
